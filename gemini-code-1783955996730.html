<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市人口流出目的地排行</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-light: #dbeafe;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-card: #ffffff;
            --bg-track: #f1f5f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: transparent;
            margin: 0;
            padding: 10px;
            color: var(--text-main);
        }

        /* 自适应卡片容器 */
        .storymap-card {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
            border: 1px solid #e2e8f0;
            box-sizing: border-box;
        }

        .header {
            margin-bottom: 20px;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 左侧装饰条 */
        .title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 18px;
            background-color: var(--primary-color);
            border-radius: 2px;
        }

        /* 下拉选择框样式 */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        select {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background-color: #fff;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* 列表行样式 */
        .data-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 排名徽章 */
        .rank-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--bg-track);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 前三名高亮 */
        .data-row:nth-child(1) .rank-badge { background-color: #ef4444; color: white; }
        .data-row:nth-child(2) .rank-badge { background-color: #f97316; color: white; }
        .data-row:nth-child(3) .rank-badge { background-color: #eab308; color: white; }

        .city-name {
            width: 75px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 进度条轨道 */
        .bar-container {
            flex-grow: 1;
            height: 8px;
            background-color: var(--bg-track);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        /* 进度条填充 */
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, var(--primary-color));
            border-radius: 4px;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .percentage {
            width: 55px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            text-align: right;
        }
    </style>
</head>
<body>

    const yearSelect = document.getElementById('yearSelect');
    const citySelect = document.getElementById('citySelect');
    const dataList = document.getElementById('dataList');

    // 1. 初始化年份选择器
    const years = Object.keys(migrationData).sort((a,b) => b-a);
    years.forEach(year => {
        const opt = document.createElement('option');
        opt.value = year;
        opt.textContent = year + ' 年';
        yearSelect.appendChild(opt);
    });

    // 2. 根据选中的年份动态更新城市选择器
    function updateCityOptions() {
        const selectedYear = yearSelect.value;
        const previousCity = citySelect.value;
        citySelect.innerHTML = '';
        
        const cities = Object.keys(migrationData[selectedYear] || {});
        cities.forEach(city => {
            const opt = document.createElement('option');
            opt.value = city;
            opt.textContent = city;
            citySelect.appendChild(opt);
        });

        // 尽量保持之前选择的城市
        if (cities.includes(previousCity)) {
            citySelect.value = previousCity;
        }
    }

    // 3. 渲染核心柱状图列表
    function renderChart() {
        const year = yearSelect.value;
        const city = citySelect.value;
        
        if (!migrationData[year] || !migrationData[year][city]) {
            dataList.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">暂无对应数据</div>';
            return;
        }

        const listData = migrationData[year][city].sort((a, b) => a.rank - b.rank);
        dataList.innerHTML = '';
        
        listData.forEach(item => {
            const row = document.createElement('div');
            row.className = 'data-row';
            
            row.innerHTML = `
                <div class="rank-badge">${item.rank}</div>
                <div class="city-name" title="${item.destination}">${item.destination}</div>
                <div class="bar-container">
                    <div class="bar-fill" style="width: 0%"></div>
                </div>
                <div class="percentage">${item.percentage.toFixed(2)}%</div>
            `;
            
            dataList.appendChild(row);
            
            // 触发动态延时动画，使进度条平滑展开
            setTimeout(() => {
                const fill = row.querySelector('.bar-fill');
                if(fill) fill.style.width = item.percentage + '%';
            }, 60);
        });
    }

    // 事件联动绑定
    yearSelect.addEventListener('change', () => {
        updateCityOptions();
        renderChart();
    });
    citySelect.addEventListener('change', renderChart);

    // 页面首次加载初始化
    updateCityOptions();
    renderChart();
</script>

</body>
</html>
